<ion-content [fullscreen]="true" class="game-select-content">
  <section class="hero">
    <p class="eyebrow">Scelta Gioco</p>
    <h1>Benvenuto, {{ username }}</h1>
    <p class="subtitle">Scegli il gioco da avviare.</p>
  </section>

  <section class="games-grid">
    <ion-card class="game-card" button="true" (click)="goToTressetteLobby()">
      <ion-card-header>
        <ion-card-subtitle>Disponibile ora</ion-card-subtitle>
        <ion-card-title>Tressette</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        Partita realtime con lobby, bot e gameplay tavolo.
      </ion-card-content>
    </ion-card>
  </section>

  <section class="actions-row">
    <ion-button color="success" (click)="goToTressetteLobby()">Vai alla Lobby Tressette</ion-button>
    <ion-button fill="outline" color="medium" (click)="logout()">Esci</ion-button>
  </section>
</ion-content>
