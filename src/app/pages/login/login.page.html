<ion-content [fullscreen]="true" class="login-content">
  <div class="login-wrap">
    <ion-card class="login-card">
      <ion-card-header>
        <ion-card-title>GAME LAND</ion-card-title>
        <ion-card-subtitle>Accedi per scegliere il gioco</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <ion-item lines="full">
          <ion-label position="stacked">Username</ion-label>
          <ion-input [(ngModel)]="username" name="username" placeholder="Inserisci username" type="text"></ion-input>
        </ion-item>

        <ion-text color="danger" *ngIf="usernameErrorVisible" class="field-error">
          Username obbligatorio.
        </ion-text>

        <ion-item lines="full">
          <ion-label position="stacked">Password</ion-label>
          <ion-input
            [(ngModel)]="password"
            name="password"
            placeholder="Inserisci password"
            type="password"
          ></ion-input>
        </ion-item>

        <ion-button color="success" expand="block" class="submit-btn" (click)="onSubmit()">Accedi</ion-button>

        <div class="social-row">
          <ion-button fill="outline" color="danger" size="small">Gmail</ion-button>
          <ion-button fill="outline" color="primary" size="small">Facebook</ion-button>
          <ion-button fill="outline" color="dark" size="small">Twitter</ion-button>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
