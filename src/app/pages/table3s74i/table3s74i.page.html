<ion-content [fullscreen]="true">
  <div class="game-table">
    <div class="play-area" #playArea></div>
    <div class="card-row">
      <div class="card" *ngFor="let card of topRow" (click)="playCard($event, card)">{{ card }}</div>
    </div>
    <div class="card-row">
      <div class="card" *ngFor="let card of bottomRow" (click)="playCard($event, card)">{{ card }}</div>
    </div> 
  </div>
</ion-content>
