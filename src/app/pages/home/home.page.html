<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Game Land</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-list color="primary">
    <ion-item color="primary">
      <ion-avatar slot="start">
        <img src="assets\avatarExample.png" alt="avatar">
      </ion-avatar>
      <ion-label>
        <h1>Pierpaolo Monaco</h1>
        <p>Total score: <span class="score"> 3400 </span></p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-card>
    <ion-card-header> 
      <ion-card-subtitle>Games</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <ion-list>
        <ion-item>Item 1</ion-item>
        <ion-item>Item 2</ion-item>
        <ion-item>Item 3</ion-item>
        <ion-item>Item 4</ion-item>
        <ion-item>Item 5</ion-item>
        <ion-item>Item 6</ion-item>
        <ion-item>Item 7</ion-item>
        <ion-item>Item 8</ion-item>
        <ion-item>Item 9</ion-item>
        <ion-item>Item 10</ion-item>
        <ion-item>Item 11</ion-item>
        <ion-item>Item 12</ion-item>
        <ion-item>Item 13</ion-item>
        <ion-item>Item 14</ion-item>
        <ion-item>Item 15</ion-item>
        <ion-item>Item 16</ion-item>
        <ion-item>Item 17</ion-item>
        <ion-item>Item 18</ion-item>
        <ion-item>Item 19</ion-item>
        <ion-item>Item 20</ion-item>
      </ion-list>
      <ion-icon slot="end" name="chevron-forward-outline" color="primary"></ion-icon>
    </ion-card-content>
  </ion-card>

</ion-content>
