<ion-content [fullscreen]="true" class="tressette-content">
  <section class="debug-header">
    <h1>Tressette Table</h1>
    <p>Backend table id: <strong>{{ tableId || 'n/a' }}</strong></p>
    <p>Socket status: <strong>{{ socketMessage }}</strong></p>
    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
  </section>

  <section class="table-meta" *ngIf="table as t">
    <p>Status: <strong>{{ t.status }}</strong> | Complete: <strong>{{ t.isComplete }}</strong></p>
    <p>Owner: <strong>{{ t.owner }}</strong> | Players: <strong>{{ t.players.length }}</strong></p>
    <ul>
      <li *ngFor="let p of t.players">{{ p.username }} ({{ p.position }})</li>
    </ul>
  </section>

  <p class="loading" *ngIf="loading">Loading table from backend...</p>

  <div class="game-table">
    <div class="play-area" #playArea>
      <app-card-played-area [playedCard]="card!"></app-card-played-area>
    </div>
    <app-card-it10 (onPlayedCard)="card=$event"></app-card-it10>
  </div>
</ion-content>
